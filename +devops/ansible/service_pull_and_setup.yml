---
- name: Pull image and setup service environment
  hosts: all
  become: true

  vars:
    compose_dir: /opt/docker/compose/projects/ptc-production

  vars_files:
    - ../+production/vault.yml

  tasks:
    - name: Pull Docker image
      community.docker.docker_image:
        name: "{{ registry_image }}"
        source: pull
        force_source: true

    - name: Write version file
      ansible.builtin.copy:
        content: "{{ version }}"
        dest: "{{ compose_dir }}/.version.{{ project_service }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Write docker-compose .env file
      ansible.builtin.copy:
        content: |
          POSTGRES_PASSWORD={{ vault_database_password }}
        dest: "{{ compose_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    - name: Write backend environment file
      ansible.builtin.copy:
        content: |
          DATABASE_URL={{ vault_database_url }}
          DATABASE_USERNAME={{ vault_database_username }}
          DATABASE_PASSWORD={{ vault_database_password }}
          JWT_SECRET_KEY={{ vault_jwt_secret_key }}
        dest: "{{ compose_dir }}/.env.{{ project_service }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      when: project_service == "backend"
