services:
  ptc-production-postgres:
    image: postgres:16-alpine
    container_name: ptc-production-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: root
      POSTGRES_USER: tripagencymanagement
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripagencymanagement -d root"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ptc-production-network

volumes:
  postgres-data:

networks:
  ptc-production-network:
    driver: bridge
