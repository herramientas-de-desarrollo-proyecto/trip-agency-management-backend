services:
  postgres:
    image: 'postgres:latest'
    container_name: db-tripagency-management
    shm_size: 256mb
    environment:
      - 'POSTGRES_DB=root'
      - 'POSTGRES_PASSWORD=root'
      - 'POSTGRES_USER=tripagencymanagement'
    volumes:
      - ../db-tripagencymanagement-data-backup:/var/lib/postgresql/data
    ports:
      - '5434:5432'
