server.port=0

# Disable Spring Boot Docker Compose integration
spring.docker.compose.enabled=false

# Database Configuration (provided by CI environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/root}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tripagencymanagement}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# JPA/Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false

# Liquibase Migration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Logging (reduced for CI)
logging.level.root=WARN

# Terminal
spring.output.ansi.enabled=detect
