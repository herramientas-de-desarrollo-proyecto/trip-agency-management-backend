server.port=80

# Disable Spring Boot Docker Compose integration
spring.docker.compose.enabled=false

# Database Configuration (Override in deployment)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/root}
spring.datasource.username=${DATABASE_USERNAME:tripagencymanagement}
spring.datasource.password=${DATABASE_PASSWORD:root}

# JPA/Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false

# Liquibase Migration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# JWT Configuration (override via environment variable)
jwt.secret-key=${JWT_SECRET_KEY}

# Logging (reduced for production)
logging.level.root=WARN
logging.level.com.tripagencymanagement=INFO
logging.level.org.hibernate.SQL=OFF

# Terminal
spring.output.ansi.enabled=detect
