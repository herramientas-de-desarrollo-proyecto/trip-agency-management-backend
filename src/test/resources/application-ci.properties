# ========================================
# CI Profile — GitHub Actions & Jenkins
# ========================================

server.port=0

# PostgreSQL — port is configurable via env vars for different CI environments
# GitHub Actions: SPRING_DATASOURCE_URL overrides to port 5434
# Jenkins:        SPRING_DATASOURCE_URL overrides to port 5432
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/root}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tripagencymanagement}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Disable Docker Compose auto-start in CI
spring.docker.compose.enabled=false

# Logging — keep CI output clean
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
