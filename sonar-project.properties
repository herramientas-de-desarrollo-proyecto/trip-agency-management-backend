# ========================================
# SonarQube Configuration
# ========================================

sonar.projectKey=trip-agency-management-backend
sonar.projectName=Trip Agency Management Backend

# Sources and tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions — QueryDSL generated Q* classes
sonar.exclusions=**/Q*.java,**/target/generated-sources/**

# Encoding
sonar.sourceEncoding=UTF-8
